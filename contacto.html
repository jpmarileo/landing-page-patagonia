<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - THERMASHIELD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50">

  <div id="navbar"></div>

  <section class="py-24 bg-gradient-to-br from-cyan-50 to-blue-50">
    <div class="max-w-3xl mx-auto px-6">
      <div class="text-center mb-12">
        <h2 class="text-5xl font-bold">¿Listo para enfrentar el invierno?</h2>
        <p class="mt-4 text-xl text-gray-600">Déjanos tus datos y te contactamos en menos de 24 horas</p>
      </div>

      <form id="contact-form" action="https://formspree.io/f/tu-id-aqui" method="POST" 
            class="bg-white rounded-3xl shadow-xl p-10">
        
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium mb-2">Nombre completo</label>
            <input type="text" name="nombre" required class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-cyan-600">
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Teléfono / WhatsApp</label>
            <input type="tel" name="telefono" required class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-cyan-600">
          </div>
        </div>

        <div class="mt-6">
          <label class="block text-sm font-medium mb-2">Ciudad</label>
          <input type="text" name="ciudad" required placeholder="Ej: Puerto Montt, Valdivia, Coyhaique" 
                 class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-cyan-600">
        </div>

        <div class="mt-6">
          <label class="block text-sm font-medium mb-2">Producto de interés</label>
          <select name="producto" required class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-cyan-600">
            <option value="">Selecciona...</option>
            <option value="Camiseta Térmica">Camiseta Térmica Base</option>
            <option value="Chaqueta Hidrofóbica">Chaqueta Hidrofóbica 3-en-1</option>
            <option value="Pantalón Térmico">Pantalón Térmico</option>
            <option value="Set Completo">Set Completo Invierno</option>
          </select>
        </div>

        <div class="mt-6">
          <label class="block text-sm font-medium mb-2">Mensaje adicional (talla, color, etc.)</label>
          <textarea name="mensaje" rows="5" class="w-full px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-cyan-600"></textarea>
        </div>

        <button type="submit" 
                class="mt-10 w-full bg-gradient-to-r from-cyan-600 to-blue-600 text-white py-5 rounded-3xl font-semibold text-lg">
          ENVIAR SOLICITUD
        </button>
      </form>
    </div>
  </section>

  <div id="footer"></div>
  <script src="js/main.js"></script>
</body>
</html>
