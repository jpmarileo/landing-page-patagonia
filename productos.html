<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - THERMASHIELD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50">

  <!-- Navbar correcto (solo uno) -->
  <div id="navbar"></div>

  <!-- Contenido principal -->
  <section class="pt-8 pb-24">
    <div class="max-w-7xl mx-auto px-5 md:px-6">
      <div class="text-center mb-12">
        <span class="text-cyan-600 font-semibold tracking-widest text-sm">EQUIPAMIENTO PARA EL SUR</span>
        <h2 class="text-4xl md:text-5xl font-bold mt-3">Nuestros productos estrella</h2>
        <p class="mt-4 text-gray-600 max-w-md mx-auto">
          Diseñados y probados en el clima más exigente de Chile
        </p>
      </div>

      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="productos-grid"></div>
    </div>
  </section>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- WhatsApp flotante -->
  <a href="https://wa.me/569XXXXXXXX" target="_blank" class="whatsapp-float">
    <i class="fa-brands fa-whatsapp"></i>
  </a>

  <script src="js/main.js"></script>
</body>
