<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THERMASHIELD - Ropa Térmica & Hidrofóbica para el Sur</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Hero -->
  <section class="hero-bg min-h-screen flex items-center pt-20">
    <div class="max-w-7xl mx-auto px-6 text-white">
      <div class="max-w-2xl">
        <div class="inline-flex items-center gap-2 bg-white/20 backdrop-blur-md px-5 py-2 rounded-3xl text-sm mb-6">

        </div>

          Ropa que te protege<br>del <span class="text-cyan-400">frío y la lluvia</span>

        </p>
        <div class="flex flex-wrap gap-4">
          <a href="productos.html" 
             class="bg-white text-gray-900 hover:bg-gray-100 px-10 py-4 rounded-3xl font-semibold text-lg inline-flex items-center gap-3 transition-all">

            <i class="fa-solid fa-arrow-right"></i>

          <a href="contacto.html" 
             class="border-2 border-white/80 hover:border-white px-8 py-4 rounded-3xl font-medium text-lg transition-all">
